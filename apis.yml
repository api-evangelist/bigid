aid: bigid
url: https://raw.githubusercontent.com/api-evangelist/bigid/refs/heads/main/apis.yml
name: BigID
description: >-
  BigID is a New York City-headquartered data security platform that combines
  Data Security Posture Management (DSPM), Data Loss Prevention (DLP), access
  governance, AI security & governance (AISPM), privacy automation, and a
  unified Data & AI Catalog. Founded in 2016 by Dimitri Sirota and Nimrod Vax,
  BigID exposes every action available in its UI through a REST API rooted at
  /api/v1 — covering data sources, scans, catalog, cluster analysis, DSPM
  cases, and DSARs — plus an App Framework for building custom apps, a
  connector framework (Java and REST) for new data sources, and an MCP
  surface for AI agents.
