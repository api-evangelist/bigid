apis:
  - aid: bigid:bigid-authentication-api
    name: BigID Authentication API
    description: >-
      Authenticate against a BigID deployment using either username/password or
      a long-lived user token. Exchange a user token for a short-lived system
      token (JWT) used to authorize subsequent REST API calls.
    humanURL: https://developer.bigid.com/api/bigid-api-token-authentication/
    tags:
      - Authentication
      - Sessions
      - Tokens
    properties:
      - url: https://developer.bigid.com/api/bigid-api-user-authentication/
        type: Documentation
      - url: https://developer.bigid.com/api/bigid-api-token-authentication/
        type: Documentation
      - url: openapi/bigid-authentication-api-openapi.yml
        type: OpenAPI
      - url: examples/bigid-create-session-example.json
        type: Example
      - type: NaftikoCapability
        url: capabilities/authentication-sessions.yaml
  - aid: bigid:bigid-data-sources-api
    name: BigID Data Sources API
    description: >-
      Programmatically manage data source connections in BigID. List, create,
      test, and export data sources, and inspect the catalog of available
      connector templates (e.g. rdb-mysql, s3-v2, snowflake, sharepoint-online).
    humanURL: https://developer.bigid.com/api/data-source-connections-api-tutorial/
    tags:
      - Data Sources
      - Connectors
    properties:
      - url: https://developer.bigid.com/api/data-source-connections-api-tutorial/
        type: Documentation
      - url: https://developer.bigid.com/api/bigid-api-add-data-source-tutorial/
        type: Documentation
      - url: openapi/bigid-data-sources-api-openapi.yml
        type: OpenAPI
      - url: json-schema/bigid-data-source-schema.json
        type: JSONSchema
      - url: examples/bigid-list-data-sources-example.json
        type: Example
      - type: NaftikoCapability
        url: capabilities/data-sources-connections.yaml
      - type: NaftikoCapability
        url: capabilities/data-sources-templates.yaml
  - aid: bigid:bigid-scans-api
    name: BigID Scans API
    description: >-
      Configure and execute BigID scans. Create scan profiles to control which
      data sources are scanned and using which classifier template, then start
      and monitor scan executions and parent-scan rollups.
    humanURL: https://developer.bigid.com/api/scan-profiles-api-tutorial/
    tags:
      - Scans
      - Scan Profiles
    properties:
      - url: https://developer.bigid.com/api/scan-profiles-api-tutorial/
        type: Documentation
      - url: https://developer.bigid.com/api/scan-insights-api-tutorial/
        type: Documentation
      - url: openapi/bigid-scans-api-openapi.yml
        type: OpenAPI
      - type: NaftikoCapability
        url: capabilities/scans-profiles.yaml
      - type: NaftikoCapability
        url: capabilities/scans-executions.yaml
  - aid: bigid:bigid-data-catalog-api
    name: BigID Data Catalog API
    description: >-
      Query and export BigID's data catalog — the central inventory of objects,
      columns, and attributes discovered by BigID scans. Includes metadata
      export, duplicate-detection, and cluster-similar-column lookups.
    humanURL: https://developer.bigid.com/api/bigid-api-metadata-export-tutorial/
    tags:
      - Catalog
      - Metadata
      - Duplicates
    properties:
      - url: https://developer.bigid.com/api/bigid-api-metadata-export-tutorial/
        type: Documentation
      - url: https://developer.bigid.com/api/bigid-api-duplicate-data-tutorial/
        type: Documentation
      - url: openapi/bigid-data-catalog-api-openapi.yml
        type: OpenAPI
      - url: json-schema/bigid-catalog-object-schema.json
        type: JSONSchema
      - type: NaftikoCapability
        url: capabilities/data-catalog-objects.yaml
  - aid: bigid:bigid-cluster-analysis-api
    name: BigID Cluster Analysis API
    description: >-
      Retrieve clusters of similar data identified by BigID's cluster-analysis
      engine. Clusters group structurally or semantically similar columns and
      objects across data sources to support deduplication, retention, and
      minimization workflows.
    humanURL: https://developer.bigid.com/api/cluster-analysis-api-tutorial/
    tags:
      - Clusters
      - Analytics
    properties:
      - url: https://developer.bigid.com/api/cluster-analysis-api-tutorial/
        type: Documentation
      - url: openapi/bigid-cluster-analysis-api-openapi.yml
        type: OpenAPI
      - type: NaftikoCapability
        url: capabilities/cluster-analysis-clusters.yaml
  - aid: bigid:bigid-data-posture-api
    name: BigID Data Posture API
    description: >-
      Fetch and remediate Data Security Posture Management (DSPM) findings via
      BigID's actionable insights API. List open cases, bulk-update them, and
      resolve individual cases with audit reasons.
    humanURL: https://developer.bigid.com/api/data-posture-api-tutorial/
    tags:
      - DSPM
      - Actionable Insights
      - Security
    properties:
      - url: https://developer.bigid.com/api/data-posture-api-tutorial/
        type: Documentation
      - url: openapi/bigid-data-posture-api-openapi.yml
        type: OpenAPI
      - url: json-schema/bigid-case-schema.json
        type: JSONSchema
      - url: examples/bigid-list-posture-cases-example.json
        type: Example
      - type: NaftikoCapability
        url: capabilities/data-posture-cases.yaml
  - aid: bigid:bigid-dsar-api
    name: BigID DSAR API
    description: >-
      Run Data Subject Access Requests (DSARs) and retrieve the resulting
      reports. Inspect available DSAR profiles and identifier attributes,
      submit new DSAR scans, poll status, and download short or full reports in
      JSON or CSV.
    humanURL: https://developer.bigid.com/api/bigid-api-dsar-tutorial/
    tags:
      - DSAR
      - Privacy
    properties:
      - url: https://developer.bigid.com/api/bigid-api-dsar-tutorial/
        type: Documentation
      - url: openapi/bigid-dsar-api-openapi.yml
        type: OpenAPI
      - url: examples/bigid-create-dsar-report-example.json
        type: Example
      - type: NaftikoCapability
        url: capabilities/dsar-reports.yaml
